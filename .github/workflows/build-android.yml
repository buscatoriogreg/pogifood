name: Build & Deploy APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK and deploy to downloads page
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: eas build --platform android --profile apk --non-interactive --output ../pogifood.apk

      - name: Deploy APK to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: mit107.revosysinc.com
          username: opc
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: pogifood.apk
          target: /home/opc/mit107/downloads/
          strip_components: 0

      - name: Update build info on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: mit107.revosysinc.com
          username: opc
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cat > /home/opc/mit107/downloads/build-info.json << EOF
            {
              "version": "1.0.0",
              "build": "${{ github.run_number }}",
              "date": "$(date -u +'%B %d, %Y')",
              "commit": "${{ github.sha }}"
            }
            EOF
