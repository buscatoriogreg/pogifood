name: Build & Deploy APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK and deploy to downloads page
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK on EAS cloud
        run: eas build --platform android --profile apk --non-interactive

      - name: Download APK from EAS
        run: |
          APK_URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null \
            | python3 -c "import sys,json; builds=json.load(sys.stdin); print(builds[0]['artifacts']['applicationArchiveUrl'])")
          echo "APK URL: $APK_URL"
          curl -L "$APK_URL" -o ../pogifood.apk
          ls -lh ../pogifood.apk

      - name: Deploy APK to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: mit107.revosysinc.com
          username: opc
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: pogifood.apk
          target: /home/opc/mit107/downloads/
          strip_components: 0

      - name: Update build info on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: mit107.revosysinc.com
          username: opc
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            printf '{\n  "version": "1.0.0",\n  "build": "${{ github.run_number }}",\n  "date": "%s",\n  "commit": "${{ github.sha }}"\n}\n' \
              "$(date -u +'%B %d, %Y')" \
              > /home/opc/mit107/downloads/build-info.json
